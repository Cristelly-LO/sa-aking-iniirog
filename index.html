<!DOCTYPE html>
<html lang="tl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sa Aking Iniirog</title>

<!-- Google Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond:wght@300;400;500;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- =========================
COVER PAGE
========================== -->

<section id="cover">

<div class="cover-content">

<p class="book-type">
Isang Munting Aklat ng Pag-ibig
</p>

<h1>
Sa Aking Iniirog
</h1>

<p class="author">
ni Cristel
</p>

<div class="divider"></div>

<p class="date">
Ika-16 ng Hulyo, 2026
</p>

<button id="beginButton">
Pindutin upang buksan ang liham.
</button>

</div>

</section>

<!-- =========================
ENVELOPE PAGE
========================== -->

<section id="envelope" class="hidden">

<div class="envelope-wrapper">

<img
src="images/envelope.png"
alt="Envelope"
class="envelope-image">

<img
src="images/wax.png"
alt="Wax Seal"
class="wax-seal"
id="waxSeal">

</div>

<p class="instruction">
Pindutin ang selyo upang buksan ang liham.
</p>

</section>

<!-- =========================
BACKGROUND MUSIC
========================== -->

<audio id="bgMusic" loop>
<source src="music/piano.mp3" type="audio/mpeg">
</audio>

<script src="script.js"></script>

</body>
</html>
